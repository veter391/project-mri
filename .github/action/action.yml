name: 'project-mri'
description: 'Run project-mri code analysis and post SARIF results to GitHub Code Scanning'
author: 'project-mri contributors'
branding:
  icon: 'circle'
  color: 'orange'

inputs:
  path:
    description: 'Path to the project to scan (default: current directory)'
    required: false
    default: '.'
  branch:
    description: 'Git branch to analyze'
    required: false
    default: ''
  output-dir:
    description: 'Where to write reports (default: ./mri-reports)'
    required: false
    default: './mri-reports'
  upload-sarif:
    description: 'Upload SARIF to GitHub Code Scanning'
    required: false
    default: 'true'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install project-mri
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install project-mri

    - name: Run project-mri scan
      shell: bash
      run: |
        mkdir -p "${{ inputs.output-dir }}"
        mri scan "${{ inputs.path }}" \
          --branch "${{ inputs.branch }}" \
          --output "${{ inputs.output-dir }}/mri-report.html"

    - name: Generate SARIF
      if: inputs.upload-sarif == 'true'
      shell: bash
      run: |
        mri scan "${{ inputs.path }}" \
          --branch "${{ inputs.branch }}" \
          --json-out "${{ inputs.output-dir }}/mri-report.json"
        # Convert JSON to SARIF via Python helper
        python -c "
        import json
        with open('${{ inputs.output-dir }}/mri-report.json') as f:
            r = json.load(f)
        sev_to_level = {'info': 'note', 'low': 'note', 'medium': 'warning', 'high': 'error', 'critical': 'error'}
        results = []
        for finding in r.get('findings', []):
            results.append({
                'ruleId': finding['category'],
                'level': sev_to_level.get(finding['severity'], 'warning'),
                'message': {'text': finding.get('description') or finding['title']},
                'locations': [{'physicalLocation': {'artifactLocation': {'uri': finding.get('target_path') or '.'}}}] if finding.get('target_path') else [],
            })
        sarif = {'$schema': 'https://json.schemastore.org/sarif-2.1.0.json', 'version': '2.1.0', 'runs': [{'tool': {'driver': {'name': 'project-mri', 'version': '0.3.0', 'informationUri': 'https://github.com/project-mri/project-mri'}}, 'results': results}]}
        with open('${{ inputs.output-dir }}/mri-report.sarif', 'w') as f:
            json.dump(sarif, f, indent=2)
        print(f'SARIF: {len(results)} findings')
        "

    - name: Upload SARIF to GitHub Code Scanning
      if: inputs.upload-sarif == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.output-dir }}/mri-report.sarif
        category: project-mri

    - name: Upload reports as artifact
      uses: actions/upload-artifact@v4
      with:
        name: project-mri-report
        path: ${{ inputs.output-dir }}
        if-no-files-found: warn
