name: Feature request
description: Suggest an idea or improvement for MRI.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.

        MRI is maintained by a single person. Clear, well-scoped proposals that explain the underlying problem are far more likely to be accepted. Please note that not every request can be implemented.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched existing issues and discussions and this is not a duplicate.
          required: true
        - label: This request aligns with MRI being a local-first, explainable, agent-native codebase-intelligence tool.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? Describe the pain, not just the solution.
      placeholder: "I'm always frustrated when ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen? How would it behave from a user's perspective?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or existing tools you have evaluated.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Python backend / analysis engine
        - Terminal dashboard (TS)
        - Agent / MCP integration
        - CLI / configuration
        - Marketing site / docs
        - Other
    validations:
      required: true
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request to implement this (guidance welcome).
          required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, references, or any other context.
    validations:
      required: false
