name: Bug report
description: Report a defect so it can be reproduced and fixed.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        Before you continue:
        - Search [existing issues](../../issues?q=is%3Aissue) to avoid duplicates.
        - **Do not report security vulnerabilities here.** Use private reporting as described in [SECURITY.md](../../security/policy).
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: This is a bug, not a security vulnerability (those go through private reporting).
          required: true
        - label: I am able to reproduce this on the latest released version (or `main`).
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of what the bug is.
      placeholder: When I run `mri scan` on a monorepo, the dashboard renders an empty graph.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps. A link to a minimal repo is ideal.
      placeholder: |
        1. Clone `...`
        2. Run `mri scan --path .`
        3. Open the terminal dashboard
        4. See the empty graph panel
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include exact error output and stack traces.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MRI version
      description: Output of `mri --version` (or the commit SHA if running from source).
      placeholder: "0.3.1 (or commit abc1234)"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other (specify below)
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`.
      placeholder: "3.12.4"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Additional environment details
      description: Terminal/emulator, shell, container, codebase size/language, or anything else relevant.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Paste any relevant log output. This is automatically formatted as code.
      render: shell
    validations:
      required: false
