name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

# Least privilege by default; jobs escalate only if they ever need to.
permissions:
  contents: read

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Lint + type-check (src-layout, run from repo root)
  # -----------------------------------------------------------------------
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: MyPy
        run: mypy src/mri --ignore-missing-imports
      - name: Bandit
        run: bandit -r src/mri -ll

  # -----------------------------------------------------------------------
  # Backend tests
  # -----------------------------------------------------------------------
  test-backend:
    name: Backend tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        env:
          MRI_DB: /tmp/test-mri-${{ matrix.python-version }}.db
        run: |
          python -m pytest tests/ -v --tb=short --cov=mri --cov-report=term --cov-report=xml
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # -----------------------------------------------------------------------
  # Frontend build — Next.js apps (marketing site + self-hosted dashboard)
  # -----------------------------------------------------------------------
  test-frontend:
    name: Frontend build (apps/web + apps/dashboard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"   # pnpm 11 requires node >= 22.13
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Type-check both apps (tsc)
        run: pnpm -r --if-present typecheck

  # -----------------------------------------------------------------------
  # API contract — the dashboard's types are generated from the API schema.
  # If either drifts, regeneration produces a diff and this job fails.
  # -----------------------------------------------------------------------
  api-contract:
    name: API types match the schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pnpm install --frozen-lockfile
      - name: Regenerate schema and types
        run: pnpm types:api
      - name: Fail if the checked-in output is stale
        run: |
          if ! git diff --quiet -- openapi.json apps/dashboard/lib/api-types.ts; then
            echo "::error::openapi.json / api-types.ts are out of date — run 'pnpm types:api' and commit"
            git diff --stat -- openapi.json apps/dashboard/lib/api-types.ts
            exit 1
          fi
          echo "API types are in sync with the schema"
      - name: Build web (Next.js)
        run: pnpm --filter @mri/web build
      - name: Build dashboard (Next.js static export + embed)
        run: pnpm --filter @mri/dashboard build

  # -----------------------------------------------------------------------
  # Dashboard end-to-end + accessibility (real browser, real server)
  # -----------------------------------------------------------------------
  e2e:
    name: Dashboard e2e + axe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install web deps
        run: pnpm install --frozen-lockfile
      - name: Build + embed the dashboard
        run: pnpm --filter @mri/dashboard build
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Install browser
        run: python -m playwright install --with-deps chromium
      - name: Run e2e + axe
        run: pytest tests/test_dashboard_e2e.py -v

  # -----------------------------------------------------------------------
  # Packaging — exercise the artifact users actually install. Every other job
  # runs `pip install -e .`, which serves the dashboard from the source tree
  # and would never notice a wheel shipping without it.
  # -----------------------------------------------------------------------
  package:
    name: Wheel builds, installs and serves
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build + embed the dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @mri/dashboard build
      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Assert the dashboard is inside the wheel
        run: |
          python - <<'PY'
          import glob, sys, zipfile
          whl = sorted(glob.glob("dist/*.whl"))[-1]
          names = zipfile.ZipFile(whl).namelist()
          required = [
              "mri/_frontend/dashboard/index.html",
              "mri/_frontend/dashboard/csp-script-hashes.json",
          ]
          missing = [r for r in required if not any(n.endswith(r) for n in names)]
          if missing:
              sys.exit(f"wheel {whl} is missing: {missing}")
          print(f"{whl}: dashboard present ({sum('_frontend' in n for n in names)} files)")
          PY
      - name: Install the wheel in a clean env and serve it
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install --upgrade pip
          /tmp/venv/bin/pip install dist/*.whl
          /tmp/venv/bin/mri serve --host 127.0.0.1 --port 7331 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:7331/api/health >/dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:7331/api/health >/dev/null || { echo "server did not start"; exit 1; }
          code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:7331/dashboard/)
          test "$code" = "200" || { echo "/dashboard/ returned $code from the installed wheel"; exit 1; }
          echo "installed wheel serves /dashboard/"

  # -----------------------------------------------------------------------
  # Attribution hygiene — no AI-authorship attribution anywhere.
  # Product mentions of AI coding tools are fine; authorship claims are not.
  # -----------------------------------------------------------------------
  attribution-hygiene:
    name: Attribution hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan tree
        run: |
          set -e
          pattern='Co-authored-by:[[:space:]]*Claude|Generated with[[:space:]]*\[?Claude|🤖[[:space:]]*Generated'
          if grep -rIniE "$pattern" . --exclude-dir=.git --exclude-dir=node_modules; then
            echo "::error::AI-authorship attribution found in the tree"
            exit 1
          fi
          echo "tree clean"
      - name: Scan commit messages
        run: |
          set -e
          pattern='Co-authored-by:[[:space:]]*Claude|Generated with[[:space:]]*\[?Claude|🤖[[:space:]]*Generated'
          if git log --format='%B' | grep -IniE "$pattern"; then
            echo "::error::AI-authorship attribution found in commit messages"
            exit 1
          fi
          echo "history clean"

  # -----------------------------------------------------------------------
  # Docker build + smoke
  # -----------------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        run: docker build -t project-mri:test .
      - name: Smoke test
        run: |
          docker run --rm -d --name mri-test -p 17331:7331 \
            -e MRI_API_KEYS=test -e MRI_ALLOWED_ROOTS=/tmp \
            project-mri:test
          sleep 5
          curl -fsS http://localhost:17331/api/health || (echo "API not healthy"; exit 1)
          curl -fsS http://localhost:17331/api/health/deep || (echo "Deep health failed"; exit 1)
          docker stop mri-test

  # -----------------------------------------------------------------------
  # Security audit
  # -----------------------------------------------------------------------
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install bandit pip-audit
      - name: Bandit (full scan)
        run: bandit -r src/mri -f json -o /tmp/bandit.json
        continue-on-error: true
      - name: Bandit report
        run: |
          python -c "
          import json, sys
          with open('/tmp/bandit.json') as f:
              data = json.load(f)
          high = sum(1 for r in data['results'] if r['issue_severity'] == 'HIGH')
          medium = sum(1 for r in data['results'] if r['issue_severity'] == 'MEDIUM')
          print(f'High: {high}, Medium: {medium}')
          sys.exit(1 if high > 0 else 0)
          "
      - name: pip-audit
        run: pip-audit --strict || true
