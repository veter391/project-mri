name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Lint + type-check
  # -----------------------------------------------------------------------
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy bandit safety
      - name: Ruff
        working-directory: backend
        run: ruff check mri/ tests/
      - name: MyPy (non-blocking)
        working-directory: backend
        run: mypy mri/ --ignore-missing-imports || true
      - name: Bandit
        working-directory: backend
        run: bandit -r mri/ -ll
      - name: Safety
        working-directory: backend
        run: safety check --file requirements.txt
        continue-on-error: true

  # -----------------------------------------------------------------------
  # Backend tests
  # -----------------------------------------------------------------------
  test-backend:
    name: Backend tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git
      - name: Install Python deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        working-directory: backend
        env:
          MRI_DB: /tmp/test-mri-${{ matrix.python-version }}.db
        run: |
          PYTHONPATH=. python -m pytest tests/ -v --tb=short --cov=mri --cov-report=term --cov-report=xml
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  # -----------------------------------------------------------------------
  # Frontend lint + smoke test
  # -----------------------------------------------------------------------
  test-frontend:
    name: Frontend smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package.json
      - name: Install
        run: npm ci || npm install
      - name: TypeScript build
        run: npx tsc --noEmit
      - name: HTML validation (basic)
        run: |
          for f in *.html; do
            echo "Checking $f..."
            test -f "$f" || (echo "Missing $f" && exit 1)
          done

  # -----------------------------------------------------------------------
  # Docker build
  # -----------------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        working-directory: backend
        run: docker build -t project-mri:test .
      - name: Smoke test
        run: |
          docker run --rm -d --name mri-test -p 17331:7331 \
            -e MRI_API_KEYS=test -e MRI_ALLOWED_ROOTS=/tmp \
            project-mri:test
          sleep 5
          curl -fsS http://localhost:17331/api/health || (echo "API not healthy"; exit 1)
          curl -fsS http://localhost:17331/api/health/deep || (echo "Deep health failed"; exit 1)
          docker stop mri-test

  # -----------------------------------------------------------------------
  # Security audit
  # -----------------------------------------------------------------------
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install
        working-directory: backend
        run: pip install bandit safety pip-audit
      - name: Bandit (full scan)
        working-directory: backend
        run: bandit -r mri/ -f json -o /tmp/bandit.json
        continue-on-error: true
      - name: Bandit report
        working-directory: backend
        run: |
          python -c "
import json, sys
with open('/tmp/bandit.json') as f:
    data = json.load(f)
high = sum(1 for r in data['results'] if r['issue_severity'] == 'HIGH')
medium = sum(1 for r in data['results'] if r['issue_severity'] == 'MEDIUM')
print(f'High: {high}, Medium: {medium}')
sys.exit(1 if high > 0 else 0)
"
      - name: pip-audit
        working-directory: backend
        run: pip-audit --strict || true