# Publish the container image to GHCR on every version tag.
#
# Uses the workflow's built-in GITHUB_TOKEN (packages: write) — no PAT needed.
# Note: the first published package is PRIVATE by default; flip it to public
# once in GitHub → Packages → project-mri → Package settings → Change visibility.

name: Release container

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/project-mri
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the pushed image
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          docker run --rm -d --name mri-rel -p 17331:7331 \
            -e MRI_API_KEYS=test -e MRI_ALLOWED_ROOTS=/tmp "$IMAGE"
          sleep 5
          curl -fsS http://localhost:17331/api/health
          docker stop mri-rel
