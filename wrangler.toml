# Cloudflare Workers — static-assets deploy for the project-mri marketing site.
#
# The site is pure static (HTML/CSS + compiled TS), so there is NO Worker script
# and NO @opennextjs/cloudflare here — assets are served directly by Workers.
# Build first: `pnpm run site:bundle` (tsc -> dist/, then assemble ./_site).
#
# Deploy (owner-gated — needs a Cloudflare login):
#   pnpm run deploy:preview     # -> project-mri-site-preview.<account>.workers.dev
#   pnpm run deploy             # -> production (workers.dev + custom domain once set)

name = "project-mri-site"
compatibility_date = "2026-05-12"

[assets]
directory = "./_site"
# Clean URLs: a request for /features serves features.html; /about -> about.html.
html_handling = "auto-trailing-slash"
# No SPA server rewrite — this is a real multi-page site (chrome.ts enhances nav
# client-side, with a hard-navigation fallback). Unknown paths get a plain 404.
not_found_handling = "none"

[observability]
enabled = true

# --- Preview environment -----------------------------------------------------
[env.preview]
name = "project-mri-site-preview"

[env.preview.assets]
directory = "./_site"
html_handling = "auto-trailing-slash"
not_found_handling = "none"

# --- Production environment --------------------------------------------------
[env.production]
name = "project-mri-site"
workers_dev = true
# Add the custom domain here once the owner points DNS at Cloudflare, e.g.:
# routes = [
#   { pattern = "project-mri.org", custom_domain = true },
#   { pattern = "www.project-mri.org", custom_domain = true },
# ]

[env.production.assets]
directory = "./_site"
html_handling = "auto-trailing-slash"
not_found_handling = "none"
