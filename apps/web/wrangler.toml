# Cloudflare Workers deploy for the MRI marketing site.
#
# A thin Worker (worker/index.mjs) fronts the static export in ./out: it serves
# assets via the ASSETS binding and attaches the strict, per-build-hashed CSP +
# security headers (too long for a _headers file — Cloudflare caps its lines at
# 2000 chars). Build first: `pnpm --filter @mri/web build`.
#
# Deploy:
#   pnpm --filter @mri/web deploy:preview
#   pnpm --filter @mri/web deploy

name = "project-mri-site"
main = "worker/index.mjs"
compatibility_date = "2026-05-12"

[assets]
directory = "./out"
binding = "ASSETS"
run_worker_first = true
# Next export writes route/index.html (trailingSlash: true); serve them cleanly.
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"

[observability]
enabled = true

# --- Preview -----------------------------------------------------------------
[env.preview]
name = "project-mri-site-preview"

[env.preview.assets]
directory = "./out"
binding = "ASSETS"
run_worker_first = true
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"

# --- Production --------------------------------------------------------------
[env.production]
name = "project-mri-site"
workers_dev = true
routes = [
  { pattern = "mri.shypot.com", custom_domain = true },
]

[env.production.assets]
directory = "./out"
binding = "ASSETS"
run_worker_first = true
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
